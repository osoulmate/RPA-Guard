<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ClawVerify</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at top left, #dbeafe 0, #eff6ff 45%, #f8fafc 100%);
            color: #0f172a;
        }
        .panel {
            width: min(92vw, 420px);
            background: rgba(255,255,255,.92);
            border: 1px solid #dbe4f0;
            border-radius: 16px;
            box-shadow: 0 18px 30px rgba(15, 23, 42, .12);
            padding: 26px;
        }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { margin: 0 0 20px; color: #64748b; font-size: 14px; }
        label { display: block; margin: 10px 0 6px; font-size: 14px; }
        input {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }
        button {
            margin-top: 16px;
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 11px 14px;
            background: #2563eb;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .alert {
            margin-top: 12px;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>ClawVerify 登录</h1>
        <p>请输入用户名与密码访问工业级审计控制台。</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for _, message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">登录并进入系统</button>
        </form>
    </div>
</body>
</html>
